services:

  airflow-init:
    image: apache/airflow:2.10.5

    container_name: airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@host.docker.internal:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin
      "

  airflow-webserver:
    image: apache/airflow:2.10.5

    container_name: airflow-webserver

    depends_on:
      - airflow-init

    ports:
      - "8080:8080"

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@host.docker.internal:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

    command: webserver

    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.5

    container_name: airflow-scheduler

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@host.docker.internal:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

    command: scheduler

    restart: unless-stopped